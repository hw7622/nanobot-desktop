<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nanobot Desktop</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">NB</div>
        <div>
          <p class="eyebrow">Desktop Control Plane</p>
          <h1>Nanobot</h1>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-footer">
        <div id="saveState" class="save-state">正在加载</div>
        <button id="saveBtn" class="button button-primary">保存配置</button>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Operator Console</p>
          <h2 id="pageTitle">概览</h2>
        </div>
        <div class="status-strip">
          <div class="status-pill">
            <span class="status-dot" id="gatewayDot"></span>
            <span id="gatewayLabel">Gateway 未知</span>
          </div>
          <div class="status-meta" id="versionMeta"></div>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>
  <script>
    (function () {
      var saveState = document.getElementById('saveState');
      var gatewayLabel = document.getElementById('gatewayLabel');
      if (saveState) saveState.textContent = 'inline script ok';
      window.addEventListener('error', function (event) {
        if (saveState) saveState.textContent = 'JS Error: ' + event.message;
        if (gatewayLabel) gatewayLabel.textContent = 'JS Error';
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        var message = reason && reason.message ? reason.message : String(reason);
        if (saveState) saveState.textContent = 'Promise Error: ' + message;
        if (gatewayLabel) gatewayLabel.textContent = 'Promise Error';
      });
    })();
  </script>
  <script defer src="./app.js" onerror="document.getElementById('saveState').textContent='app.js load failed'; document.getElementById('gatewayLabel').textContent='Script Load Failed';"></script>
</body>
</html>
